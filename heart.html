<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Je t'aime ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="favicon.ico">
    <style>
        /* --- Base page --- */
        body {
            background: #000;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Contenedor Responsivo "Ultra-Wide" --- */
        #ui {
            position: relative;
            /* Subimos a 1000px para dar un margen de seguridad masivo al texto */
            width: 1000px;
            height: 700px;

            /* Escalamos basado en 1000px para forzar un tamaño menor en móvil */
            /* Usamos 90vw para dejar un margen estético en los bordes del celular */
            transform: scale(min(1, calc(90vw / 1000)));
            transform-origin: center center;
        }

        /* --- Love words --- */
        #ui .love {
            position: absolute;
            /* Centramos el inicio de la animación (de 450px) dentro de los 1000px */
            /* (1000px - 450px) / 2 = 275px */
            top: 120px;
            left: 275px;
            --i: 1;
        }

        #ui .love:last-child .love_word {
            color: #ea80b0;
            font-size: 1.4rem;
            text-shadow: 0 0 10px #fff;
        }

        #ui .love_word {
            color: #ea80b0;
            font-size: 1.4rem;
            transform: translateY(-100%) rotateZ(-30deg);
            text-shadow: 0 0 10px #fff;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        #ui .love_horizontal {
            animation: horizontal 10000ms infinite alternate ease-in-out;
            animation-delay: calc(var(--i) * -300ms);
        }

        #ui .love_vertical {
            animation: vertical 20000ms infinite linear;
            animation-delay: calc(var(--i) * -300ms);
        }

        /* --- Animations (Intactas) --- */
        @keyframes horizontal {
            from {
                transform: translateX(0px);
            }

            to {
                transform: translateX(450px);
            }
        }

        @keyframes vertical {
            0% {
                transform: translateY(180px);
            }

            10% {
                transform: translateY(45px);
            }

            15% {
                transform: translateY(4.5px);
            }

            18% {
                transform: translateY(0px);
            }

            20% {
                transform: translateY(4.5px);
            }

            22% {
                transform: translateY(34.61538px);
            }

            24% {
                transform: translateY(64.28571px);
            }

            25% {
                transform: translateY(112.5px);
            }

            26% {
                transform: translateY(64.28571px);
            }

            28% {
                transform: translateY(34.61538px);
            }

            30% {
                transform: translateY(4.5px);
            }

            32% {
                transform: translateY(0px);
            }

            35% {
                transform: translateY(4.5px);
            }

            40% {
                transform: translateY(45px);
            }

            50% {
                transform: translateY(180px);
            }

            71% {
                transform: translateY(428.57143px);
            }

            72.5% {
                transform: translateY(441.17647px);
            }

            75% {
                transform: translateY(450px);
            }

            77.5% {
                transform: translateY(441.17647px);
            }

            79% {
                transform: translateY(428.57143px);
            }

            100% {
                transform: translateY(180px);
            }
        }
    </style>
</head>

<body>
    <div id="ui"></div>

    <script>
        const N = 100;
        const ui = document.getElementById('ui');

        for (let i = 1; i <= N; i++) {
            const love = document.createElement('div');
            love.className = 'love';
            love.style.setProperty('--i', i);

            const h = document.createElement('div');
            h.className = 'love_horizontal';

            const v = document.createElement('div');
            v.className = 'love_vertical';

            const word = document.createElement('div');
            word.className = 'love_word';
            word.textContent = 'Je t\'aime, Sally';

            v.appendChild(word);
            h.appendChild(v);
            love.appendChild(h);
            ui.appendChild(love);
        }
    </script>
</body>

</html>
