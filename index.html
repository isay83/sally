<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Sally ❤️</title>
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="particles-container"></div>

    <div id="overlay" class="overlay"></div>
    <div class="envlope-wrapper">
        <div id="envelope" class="close">
            <div class="front flap"></div>
            <div class="front pocket"></div>

            <div class="letter">
                <div class="poem-header">
                    <h2 id="poem-title">Título del Poema</h2>
                    <span id="poem-counter">1/3</span>
                </div>

                <div class="poem-content" id="poem-body">
                </div>

                <div class="poem-footer">
                    <button id="btn-prev" class="nav-btn">⬅️ Anterior</button>
                    <button id="btn-next" class="nav-btn">Siguiente ➡️</button>
                </div>
            </div>
        </div>
    </div>

    <div class="reset">
        <button id="btn-open">Abrir</button>
        <button id="btn-reset">Cerrar</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
